<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --card-bg: rgba(15, 23, 42, 0.45);
            --card-border: rgba(255, 255, 255, 0.18);
            --card-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            --body-bg: #0f172a;
            --name-color: #f1f5f9;
            --desc-color: #94a3b8;
            --profile-border: rgba(255, 255, 255, 0.5);
            --img-placeholder: rgba(255,255,255,0.1);
            --wave-fill: rgba(15, 23, 42, 0.4);
            --toggle-bg: rgba(255,255,255,0.12);
            --toggle-border: rgba(255,255,255,0.22);
            --toggle-color: #e2e8f0;
        }

        [data-theme="light"] {
            --card-bg: rgba(255, 255, 255, 0.35);
            --card-border: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 24px 60px rgba(79, 70, 229, 0.2);
            --body-bg: #c7d2fe;
            --name-color: #1e1b4b;
            --desc-color: #4B5563;
            --profile-border: rgba(255, 255, 255, 0.95);
            --img-placeholder: #ede9fe;
            --wave-fill: rgba(255, 255, 255, 0.35);
            --toggle-bg: rgba(79, 70, 229, 0.12);
            --toggle-border: rgba(79, 70, 229, 0.3);
            --toggle-color: #3730a3;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background-color: var(--body-bg);
            transition: background-color 0.4s ease;
        }

        canvas#particles {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
        }

        /* Toggle button */
        .theme-toggle {
            position: fixed; top: 18px; right: 18px; z-index: 100;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            border-radius: 50px;
            padding: 8px 14px;
            cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            font-size: 0.78rem; font-weight: 600;
            color: var(--toggle-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.3s, border 0.3s, color 0.3s, transform 0.15s;
            user-select: none;
        }
        .theme-toggle:hover  { transform: scale(1.05); }
        .theme-toggle:active { transform: scale(0.97); }
        .theme-toggle .icon  { font-size: 1rem; line-height: 1; }

        /* Card - no overflow:hidden so backdrop-filter can see through */
        .card {
            position: relative;
            z-index: 10;
            width: 90%; max-width: 380px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            transition: box-shadow 0.4s, border-color 0.4s;
        }

        /* The actual frosted glass background lives on ::before
           so overflow:hidden on children never clips the blur */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            z-index: 0;
            transition: background 0.4s;
        }

        /* Every direct child of card needs z-index > 0 to sit above ::before */
        .svg-header, .profile-content {
            position: relative;
            z-index: 1;
        }

        .svg-header {
            background: var(--primary-color);
            height: 130px;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
        }
        .svg-header svg {
            position: absolute; bottom: -1px; left: 0;
            width: 100%; height: 60px;
        }
        .svg-header svg path {
            fill: var(--wave-fill);
            transition: fill 0.4s;
        }

        .profile-content { padding: 0 24px 32px; }

        .profile-img {
            width: 80px; height: 80px;
            border-radius: 50%; object-fit: cover;
            margin: -40px auto 16px;
            position: relative; z-index: 2;
            border: 4px solid var(--profile-border);
            display: block;
            background-color: var(--img-placeholder);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: border-color 0.4s;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem; font-weight: 700;
            color: var(--name-color);
            transition: color 0.4s;
        }
        p {
            color: var(--desc-color);
            margin: 0 0 24px; font-size: 0.95rem; line-height: 1.4;
            transition: color 0.4s;
        }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 12px; border-radius: 10px;
            text-decoration: none; font-weight: 600; font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .email-btn    { background: rgba(238,242,255,0.88); color: #4F46E5; border: 1px solid rgba(224,231,255,0.9); }
        .linkedin-btn { background: #0A66C2; color: white; }
        .cv-en-btn    { background: rgba(243,244,246,0.88); color: #374151; border: 1px solid rgba(209,213,219,0.9); }
        .cv-tr-btn    { background: rgba(55,65,81,0.92); color: white; }

        .cv-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon" id="themeIcon">🌙</span>
        <span id="themeLabel">Dark</span>
    </button>

    <div class="card">
        <div class="svg-header">
            <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                <path fill-opacity="1" d="M0,160L48,170.7C96,181,192,203,288,192C384,181,480,139,576,133.3C672,128,768,160,864,176C960,192,1056,192,1152,176C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            </svg>
        </div>

        <div class="profile-content">
            <img src="profile.jpg" alt="Profile Picture" class="profile-img">
            <h1>Osama M. YAHIA</h1>
            <p>Agricultural Machinery and Technologies Engineering Student / Erkunt Tractor Ltd. Inc Intern</p>

            <div class="links">
                <div class="cv-container">
                    <a href="cv-english.pdf" class="link-btn cv-en-btn" target="_blank">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Resume
                    </a>
                    <a href="cv-turkish.pdf" class="link-btn cv-tr-btn" target="_blank">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Ozgecmis
                    </a>
                </div>

                <a href="mailto:osommyahia@gmail.com" class="link-btn email-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Email Me
                </a>

                <a href="https://www.linkedin.com/in/osyahia/" class="link-btn linkedin-btn" target="_blank">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                    LinkedIn
                </a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        });

        const PARTICLE_COUNT = 120;
        const CONNECTION_DIST = 130;
        const dotColors = ['#4F46E5', '#818cf8', '#38bdf8', '#6366f1'];

        const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
            x: Math.random() * W, y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
            r: Math.random() * 2.5 + 1,
            color: dotColors[Math.floor(Math.random() * dotColors.length)],
            alpha: Math.random() * 0.5 + 0.3
        }));

        let isLight = true;

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const lineRGB = isLight ? '79,70,229' : '99,102,241';
            const lineOpacity = isLight ? 0.16 : 0.25;
            const alphaMult  = isLight ? 0.6 : 1;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        const op = (1 - dist / CONNECTION_DIST) * lineOpacity;
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(${lineRGB}, ${op})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                const alphaHex = Math.round(p.alpha * alphaMult * 255).toString(16).padStart(2, '0');
                ctx.fillStyle = p.color + alphaHex;
                ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1;
                if (p.y < 0 || p.y > H) p.vy *= -1;
            }
            requestAnimationFrame(draw);
        }
        draw();

        const html       = document.documentElement;
        const toggleBtn  = document.getElementById('themeToggle');
        const themeIcon  = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        toggleBtn.addEventListener('click', () => {
            isLight = !isLight;
            html.setAttribute('data-theme', isLight ? 'light' : 'dark');
            themeIcon.textContent  = isLight ? '🌙' : '☀️';
            themeLabel.textContent = isLight ? 'Dark' : 'Light';
        });
    </script>
</body>
</html>
